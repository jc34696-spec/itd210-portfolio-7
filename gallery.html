<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Big Fit City Gym</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2.7rem 2.7rem;
            justify-items: center;
            align-items: stretch;
            max-width: 1100px;
            margin: 3rem auto 2.5rem auto;
            padding: 2.5rem 2rem;
            background: #181818;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            animation: fadeInUp 1.2s cubic-bezier(.77,0,.18,1);
        }
        .gallery-grid img {
            width: 100%;
            max-width: 320px;
            height: 200px;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.18);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s, filter 0.3s;
            filter: grayscale(0.12) brightness(0.98);
            opacity: 0;
            transform: translateY(40px) scale(0.97);
            animation: imgPop 1s cubic-bezier(.77,0,.18,1) forwards;
        }
        .gallery-grid img:nth-child(1) { animation-delay: 0.1s; }
        .gallery-grid img:nth-child(2) { animation-delay: 0.25s; }
        .gallery-grid img:nth-child(3) { animation-delay: 0.4s; }
        .gallery-grid img:hover {
            transform: scale(1.09) rotate(-2deg);
            box-shadow: 0 8px 32px #ff2d2d44, 0 2px 8px #000;
            filter: grayscale(0) brightness(1.07);
        }
        @keyframes imgPop {
            0% { opacity: 0; transform: translateY(40px) scale(0.97); }
            80% { opacity: 1; transform: translateY(-8px) scale(1.04); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .headline-animate {
            text-align: center;
            font-size: 2.7rem;
            color: #ff2d2d;
            margin: 2.5rem 0 1.5rem 0;
            opacity: 0;
            transform: translateY(40px) scale(0.95);
            transition: opacity 0.8s cubic-bezier(.77,0,.18,1), transform 0.8s cubic-bezier(.77,0,.18,1);
            animation: titlePop 1.2s cubic-bezier(.77,0,.18,1) forwards;
        }
        @keyframes titlePop {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            80% { opacity: 1; transform: translateY(-10px) scale(1.08); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .gallery-desc {
            text-align: center;
            color: #ededed;
            font-size: 1.2rem;
            margin-bottom: 2.2rem;
            opacity: 0;
            animation: fadeInUp 1.2s 0.3s both;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 700px) {
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 2rem 0;
                padding: 1.2rem 0.5rem;
            }
            .gallery-grid img {
                max-width: 98vw;
                height: 170px;
            }
        }
    </style>
</head>
<body style="background: #232323; color: #ededed; font-family: 'Arial Black', Arial, sans-serif; margin: 0;">
    <!-- ═══════════ NAVIGATION ═══════════ -->
    <header>
        <nav>
            <a class="nav-logo" href="index.html">Big Fit City Gym</a>
            <div class="nav-links">
                <a href="about me.html">About Me</a>
                <a href="index.html">Main Page</a>
                <a href="gallery.html" style="color:#ff2d2d; background:#111;">Gallery</a>
                <a href="media.html">Media</a>
                <a href="contact.html">Contact</a>
            </div>
        </nav>
    </header>

    <main>
        <h1 class="headline-animate">Gallery</h1>
        <p class="gallery-desc">This is the gallery page. Where you can see many of the activities that take place at my gym.</p>
        <section class="gallery-grid">
            <img src="images/Big City.jpg" alt="Big City">
            <img src="images/Gym.jpg" alt="Gym">
            <img src="images/Weights.jpg" alt="Weights">
            <img src="images/People together.jpg" alt="Together at the gym">
            <img src="images/Eating.jpg"alt="Eating healthy">
        </section>
    </main>

    <footer style="background: #181818; color: #fff; text-align: center; padding: 1.5rem 1rem;">
        &copy; 2026 Big Fit City Gym. All rights reserved.
    </footer>
</body>
</html>
